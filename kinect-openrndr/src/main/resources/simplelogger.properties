# SLF4J Simple Logger Configuration for Kinect V2 Project
#
# This configuration controls the logging output for Java/Kotlin code.
# For C++ JNI logging, use the KINECT_JNI_LOG_LEVEL environment variable.
#
# Available log levels: trace, debug, info, warn, error
#
# Default level: info (shows important lifecycle events, hides detailed frame data)
# For debugging: change to 'debug' or 'trace'

# Global default log level
org.slf4j.simpleLogger.defaultLogLevel=info

# Kinect-specific log levels
org.slf4j.simpleLogger.log.org.openrndr.kinect2=info
org.slf4j.simpleLogger.log.com.kinect=info

# Show timestamp in logs
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss.SSS

# Show thread name (useful for debugging acquisition thread)
org.slf4j.simpleLogger.showThreadName=true

# Show logger name (class name)
org.slf4j.simpleLogger.showLogName=true

# Show short logger name (just class, not full package)
org.slf4j.simpleLogger.showShortLogName=false

# Log to stderr (consistent with C++ JNI logging)
# Default is System.err, no need to change

# Examples for different debugging scenarios:
#
# Debug frame acquisition:
# org.slf4j.simpleLogger.log.org.openrndr.kinect2.Kinect2=debug
#
# Trace depth camera pixel data:
# org.slf4j.simpleLogger.log.org.openrndr.kinect2.Kinect2DepthCamera=trace
#
# Debug everything:
# org.slf4j.simpleLogger.defaultLogLevel=debug
